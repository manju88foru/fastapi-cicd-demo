name: First Time Server Setup

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
    - name: Connect to server and clone project
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          if [ ! -d "${{ secrets.APP_DIR }}" ]; then
            git clone https://github.com/${{ github.repository }} ${{ secrets.APP_DIR }}
          fi